schema: spec-driven

context: |
  Product goal: expose OpenCode's native web UI to any device, with automatic
  redirect to the most recently active session so every browser sees the same
  conversation. Sessions persist server-side even when the browser closes.

  Tech stack: Node.js 22 + TypeScript, native `node:http` (no runtime npm deps).
  Single package: `packages/server/` is a transparent HTTP proxy that spawns
  `opencode serve` as a child process on port 4096 and exposes port 9223.

  Architecture: `GET /` → 302 to `/<base64url(directory)>/session/<sessionId>`.
  All other requests pipe through to OpenCode unmodified. A background SSE
  keep-alive prevents OpenCode from idling. Active session is refreshed
  every 30 seconds by querying `GET /session`.

  Deployment: single-user homelab service behind Tailscale + Caddy HTTPS.
  Data: no database — all state owned by OpenCode, persisted via Docker
  volume on `~/.opencode/`.

  See `CLAUDE.md` for full technical context (URL format gotchas, Windows
  spawn quirks, session API shape).

rules:
  proposal:
    - Call out how the change interacts with OpenCode's SPA URL format.
    - List any new runtime dependencies (should usually be zero).
  tasks:
    - Group tasks by deployment surface (proxy code, Dockerfile, Caddy, autostart).
    - Include verification steps for cross-browser session sync.
