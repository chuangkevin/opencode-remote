services:
  opencode-remote:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: opencode-remote
    ports:
      - "9223:9223"
    environment:
      - TZ=Asia/Taipei
      - NODE_ENV=production
      - PORT=9223
      - OPENCODE_PORT=4096
      - OPENCODE_DIRECTORY=/workspace
      - SESSION_REFRESH_INTERVAL_MS=30000
    volumes:
      # Project directory — OpenCode works here
      - type: bind
        source: ${WORKSPACE_PATH:-D:\Projects\_HomeProject}
        target: /workspace
      # OpenCode data: session history, config, API keys
      - opencode_data:/root/.opencode
    restart: unless-stopped
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "require('http').get('http://localhost:9223/global/health',(r)=>{let d='';r.on('data',c=>d+=c);r.on('end',()=>process.exit(JSON.parse(d).healthy?0:1))}).on('error',()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  opencode_data:
    name: opencode_data
