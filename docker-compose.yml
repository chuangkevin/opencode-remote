services:
  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    container_name: opencode-remote-server
    ports:
      - "9527:9223"
    volumes:
      - opencode-remote-data:/data
    environment:
      TZ: Asia/Taipei
      RUNNER_SHARED_TOKEN: ${RUNNER_SHARED_TOKEN:-change-this-runner-token}
      SSE_HEARTBEAT_MS: ${SSE_HEARTBEAT_MS:-15000}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9223/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  runner:
    build:
      context: .
      dockerfile: packages/runner/Dockerfile
    container_name: opencode-remote-runner
    depends_on:
      server:
        condition: service_healthy
    environment:
      TZ: Asia/Taipei
      DISPATCH_SERVER_URL: http://server:9223
      RUNNER_SHARED_TOKEN: ${RUNNER_SHARED_TOKEN:-change-this-runner-token}
      RUNNER_EXECUTION_MODE: ${RUNNER_EXECUTION_MODE:-real}
      RUNNER_POLL_INTERVAL_MS: ${RUNNER_POLL_INTERVAL_MS:-3000}
      RUNNER_LEASE_MS: ${RUNNER_LEASE_MS:-15000}
      # OpenCode CLI runs on the host (same AMD 3700X box); reach it via host.docker.internal
      OPENCODE_SERVER_URL: ${OPENCODE_SERVER_URL:-http://host.docker.internal:4096}
      OPENCODE_SERVER_USERNAME: ${OPENCODE_SERVER_USERNAME:-opencode}
      OPENCODE_SERVER_PASSWORD: ${OPENCODE_SERVER_PASSWORD:-}
      OPENCODE_DIRECTORY: ${OPENCODE_DIRECTORY:-}
    restart: unless-stopped
    # Allows the runner container to reach host services on Linux (maps host.docker.internal → host gateway)
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  opencode-remote-data:
